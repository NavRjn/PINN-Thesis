problem: "1d_bratu"

model:
  name: "PNN"
  units: 50
  nz: 1                # maps to ensemble_size dimension
  ensemble_size: 1000  # problem-specific
  std: 1
  factor: 1

training:
  n: 20000
  lr: 0.001
  bz: 1                # Bratu uses full-batch 1D grid
  save_freq: 1000
  seed: 22331          # From original bratu logic

physics:
  lambda: 1.0
  nx: 1                # spatial dimensions

data:
  path: "./1d_bratu/data/data.mat"